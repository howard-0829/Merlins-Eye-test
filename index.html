    <script>
      (function () {
        const introMap = {
          zh: '這是一個玩阿瓦隆的好工具',
          en: 'This is a great tool for playing Avalon.',
        };

        window.updatePageIntroText = function updatePageIntroText(language) {
          const element = document.getElementById('page-intro-text');
          if (!element) return;
          const normalizedLanguage = language === 'en' ? 'en' : 'zh';
          element.textContent = introMap[normalizedLanguage];
        };

        const browserLanguage = (navigator.language || '').toLowerCase();
        window.updatePageIntroText(browserLanguage.startsWith('zh') ? 'zh' : 'en');
      })();
    </script>
